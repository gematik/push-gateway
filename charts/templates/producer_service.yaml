{{ $fullName := include "push-gateway.fullname" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-producer
  labels:
    {{- include "push-gateway.producer.labels" . | nindent 4 }}
    app.kubernetes.io/app: {{ $fullName }}-producer
  {{- if eq (.Values.service.useGatewayAPI) false }}
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/app-protocols: '{"api": "HTTP","management": "HTTP"}'
    cloud.google.com/backend-config: '{"default": "erezeptapp-pushgw-backendconfig"}'
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: api
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: management
{{ if .Values.backend.config.debug }}
    - port: 5005
      targetPort: 5005
      protocol: TCP
      name: debug
{{ end }}
  selector:
    {{- include "push-gateway.producer.selectorLabels" . | nindent 4 }}

{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "push-gateway.serviceAccountName" . }}
  labels:
    {{ include "push-gateway.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{ toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "push-gateway-producer"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "push-gateway-consumer"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "push-gateway-broker"
